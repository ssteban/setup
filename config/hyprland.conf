monitor=,preferred,auto,1

exec-once = waybar
exec-once = hyprpaper

input {
    kb_layout = us
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
}

decoration {
    rounding = 8
    blur = yes
    blur_size = 5
}

bind = SUPER, RETURN, exec, kitty
bind = SUPER, Q, killactive
bind = SUPER, E, exec, wofi --show drun
bind = SUPER, F, fullscreen
bind = SUPER, M, exit